name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the stale run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- Cheap gate: lint + format check (no services) -----------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (frozen)
        run: uv sync --frozen --extra dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  # --- Cheap gate: fast suite, fakes only, NO Docker (the required gate) ----
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (frozen)
        run: uv sync --frozen --extra dev
      - name: Fast suite ($0, no infra, no model, no LLM provider)
        run: uv run pytest -m "not contract and not model and not llm and not benchmark" -q

  # --- Model gate: tests that load a real spaCy model + embedder (no Docker) -
  # Separate from the required fast gate: installs the small spaCy model AND the
  # `embed` extra (sentence-transformers), then runs the `model`-marked suite
  # (real SpacyNerStage + model-availability smoke test + the bge embedder test,
  # TESTING §5). Uses en_core_web_sm — the heavy trf extra is NOT installed here.
  model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (frozen, with the embed extra)
        run: uv sync --frozen --extra dev --extra embed
      - name: Download spaCy model (en_core_web_sm)
        run: uv run python -m spacy download en_core_web_sm
      - name: Model-backed suite (spaCy NER + bge embedder)
        env:
          HF_HUB_DISABLE_XET: "1"  # route around the HF xet endpoint so bge downloads reliably
        run: uv run pytest -m model -q

  # --- Opt-in gate: real-provider LLM suite (NOT required; no secret) -------
  # Runs the `llm`-marked suite. It is deliberately NOT a required gate: with no
  # API key in the environment the tests skip cleanly (never fail), so this job
  # stays green without any secret. Add a provider key as a repo secret + export
  # it here only if you want the real-provider integration actually exercised.
  llm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (frozen)
        run: uv sync --frozen --extra dev
      - name: Real-provider LLM suite (skips cleanly without a key)
        run: uv run pytest -m llm -q

  # --- Opt-in gate: whole-pipeline benchmark smoke (NOT required) -----------
  # Runs the `benchmark`-marked V8 real-stack run (TESTING §5 gap #5). Like the
  # llm job it is deliberately NOT required: without the Docker services / models
  # / API key the single test skips cleanly, so this job stays green without any
  # infra. Wire the services + a provider key here to actually exercise it.
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (frozen)
        run: uv sync --frozen --extra dev
      - name: Benchmark smoke (skips cleanly without infra/models/key)
        run: uv run pytest -m benchmark -q

  # --- Security: secret scan (blocking) — dev-playbook #12 ------------------
  # Scans the full git history + working tree for committed secrets. Fails the
  # build on any finding (a leaked credential must never reach main). Runs the
  # pinned gitleaks binary directly so it needs no marketplace action / license.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so gitleaks can scan every commit
      - name: Run gitleaks
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner --redact --verbose --exit-code 1

  # --- Security: dependency vulnerability scan (advisory) — dev-playbook #13 -
  # Audits the locked runtime dependencies against the OSV/PyPI advisory DB.
  # Advisory (continue-on-error): a transitive CVE surfaces in the logs / summary
  # without hard-blocking a demo merge; promote to blocking once triaged.
  dep-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.12
      - name: Export locked runtime deps
        run: uv export --frozen --no-emit-project --format requirements-txt > /tmp/requirements.txt
      - name: pip-audit
        run: uvx pip-audit -r /tmp/requirements.txt --strict

  # --- Expensive gate: contract suite via testcontainers (Docker runner) ----
  # Separate from the required fast gate (dev-playbook: layer by cost, gate by
  # layer). ubuntu-latest ships a Docker daemon, so testcontainers self-provisions
  # MinIO/Kafka/ES; no manual service containers needed.
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (frozen)
        run: uv sync --frozen --extra dev
      - name: Contract suite (real adapters via testcontainers)
        run: uv run pytest -m contract -q
