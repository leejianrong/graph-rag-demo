name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels the stale run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- Cheap gate: lint + format check (no services) -----------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (frozen)
        run: uv sync --frozen --extra dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  # --- Cheap gate: fast suite, fakes only, NO Docker (the required gate) ----
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (frozen)
        run: uv sync --frozen --extra dev
      - name: Fast suite ($0, no infra)
        run: uv run pytest -m "not contract" -q

  # --- Expensive gate: contract suite via testcontainers (Docker runner) ----
  # Separate from the required fast gate (dev-playbook: layer by cost, gate by
  # layer). ubuntu-latest ships a Docker daemon, so testcontainers self-provisions
  # MinIO/Kafka/ES; no manual service containers needed.
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync (frozen)
        run: uv sync --frozen --extra dev
      - name: Contract suite (real adapters via testcontainers)
        run: uv run pytest -m contract -q
