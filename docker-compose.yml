# One-command local dev loop (ARCHITECTURE §8, dev-playbook #16).
#
# Brings up the stack — Kafka, MinIO, a single-node Elasticsearch, Neo4j, and the
# pipeline/API `app` service — with healthchecks so `app` waits for its deps.
# Service hostnames (minio / elasticsearch / kafka / neo4j) match the Settings
# defaults and .env.example. Neo4j (V5, the knowledge-graph store) exposes the
# browser on 7474 and bolt on 7687; auth is neo4j/devpassword (a LOCAL-DEV default,
# overridable via NEO4J_PASSWORD to match Settings).
#
#   make up      # build + start everything
#   curl -F file=@a.md http://localhost:8000/ingest
#
# All settings come from .env (copy .env.example -> .env).

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"        # local only — security off for dev
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  neo4j:
    image: neo4j:5.20
    environment:
      # LOCAL-DEV auth only — override NEO4J_PASSWORD to match Settings.neo4j_password.
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-devpassword}
    ports:
      - "7474:7474"    # HTTP browser
      - "7687:7687"    # Bolt (driver)
    volumes:
      - neo4j-data:/data
    healthcheck:
      # Wait for bolt: a trivial cypher over cypher-shell proves the DB is ready.
      test:
        ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-devpassword} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false    # copy .env.example -> .env; falls back to defaults below
    environment:
      # Override the service endpoints to the compose network hostnames so this
      # works regardless of what .env carries for local (host-side) runs.
      MINIO_ENDPOINT: minio:9000
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-devpassword}
    ports:
      - "8000:8000"    # FastAPI: /ingest + /query
    depends_on:
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  minio-data:
  neo4j-data:
